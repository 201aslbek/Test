<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Savdo - Texnik ishlar</title>
    <style>
        /* Asosiy fon va dizayn */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b1d47; /* To'q ko'k fon */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            color: red; /* Och ko'k matn rangi */
            text-align: center;
        }

        .container {
            max-width: 400px;
            padding: 20px;
        }

        /* Logo qismi */
        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: white;
            margin-bottom: 30px;
        }
        .logo span {
            color: #007bff; /* 'Savdo' so'zi uchun ko'k rang */
        }

        /* Matnlar */
        h1 {
            font-size: 1.8rem;
            line-height: 1.4;
            margin-bottom: 40px;
        }

        /* Click Here tugmasi */
        .btn {
            display: inline-block;
            background-color: #38b6ff; /* Tugma rangi */
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
            text-transform: uppercase;
        }

        /* Tugma bosilganda yoki ustiga borganda effekt */
        .btn:hover {
            background-color: #0099ff;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">ID<span>Savdo</span></div>

        <h2>
            Hozirda Botda<br>
            Tuzatish Ishlari<br>
            Ketyabdi!<br>
            
        </h2>
 <h1>  </h1>
        <a href="https://t.me/idsavdo" class="btn" target="_blank">CLICK HERE</a>
    </div>

</body>
</html>
